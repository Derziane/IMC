<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Resultado IMC</title>
</head>
<body>
    <h1>VERIFIQUE SEU IMC</h1>

<form action="/res-imc" method="GET">
    <label>Peso:</label>
    <input type="number" step="0.01" name="pesoUser">

    <label>Altura:</label>
    <input type="number" step="0.01" name="alturaUser">

    <button type="submit">Calcular IMC</button>
</form>

    <ul>
        <li><a href="/">Home</a></li>
    </ul>

    <h2 id="resultado"></h2>

    <script>
        const params = new URLSearchParams(window.location.search);

        const peso = parseFloat(params.get("peso"));
        const altura = parseFloat(params.get("altura"));

        const imc = peso / (altura * altura);

        document.getElementById("resultado").innerHTML =
            `O seu IMC é ${imc.toFixed(2)}`;
    </script>

    <script src="./js/server.js"></script>
</body>
</html>
